name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check dataset_builder/ --output-format=github

      - name: Run ruff format check
        run: ruff format dataset_builder/ --check

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install -r dataset_builder/requirements.txt
          pip install mypy types-jsonschema

      - name: Run mypy
        run: |
          cd dataset_builder
          mypy config.py schema/ evaluation/ generation/ ingestion/ validation/ filtering/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r dataset_builder/requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd dataset_builder
          python3 -m pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-omit="tests/*,__pycache__/*" \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: dataset_builder/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  smoke-test:
    name: Smoke test (mock pipeline)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r dataset_builder/requirements.txt

      - name: Run full mock pipeline
        run: |
          cd dataset_builder
          python3 main.py run-all --mock

      - name: Verify output files exist
        run: |
          test -f dataset_builder/data/raw_dataset.jsonl
          test -f dataset_builder/data/annotated_dataset.jsonl
          test -f dataset_builder/data/filtered_dataset.jsonl
          test -f dataset_builder/data/metrics_report.json

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            dataset_builder/data/*.jsonl
            dataset_builder/data/*.json
            dataset_builder/data/logs/*.log
          retention-days: 7
