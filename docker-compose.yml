version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn dataset_builder.api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./dataset_builder/data:/app/dataset_builder/data
    ports:
      - 8000:8000
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO

  frontend:
    image: node:20
    working_dir: /app/ui
    volumes:
      - ./ui:/app/ui
      - /app/ui/node_modules
    ports:
      - 5173:5173
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
