version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn dataset_builder.api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./dataset_builder/data:/app/dataset_builder/data
    ports:
      - 8000:8000
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://synthuser:synthpass@db:5432/synthdatalab

  frontend:
    image: node:20
    working_dir: /app/ui
    volumes:
      - ./ui:/app/ui
      - /app/ui/node_modules
    ports:
      - 5173:5173
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=synthuser
      - POSTGRES_PASSWORD=synthpass
      - POSTGRES_DB=synthdatalab
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
